<!DOCTYPE html>
<html>
<head>
    <title>Sovereign Node | Powered by Puter.js</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; padding: 30px; }
        #terminal { max-width: 900px; margin: auto; }
        .log-entry { margin-bottom: 15px; border-left: 2px solid #1a1a1a; padding-left: 15px; }
        .highlight { color: #ffffff; font-weight: bold; }
        input { background: none; border: none; color: #00ff41; width: 100%; outline: none; border-top: 1px solid #222; padding: 10px 0; font-size: 1.1em; }
    </style>
</head>
<body>

<div id="terminal">
    <div id="display">Supervisor: Initializing Sovereign Protocol via Puter.js...</div>
    <br>
    <input type="text" id="command" placeholder="Enter topic to master..." autofocus>
</div>

<script>

// --- [ SOVEREIGN CORE ] ---
const APP_ID = "app-73f3111c-3fba-4136-8c5b-b09919ba981e"; // Replace with your UUID from Puter Console 1
let user = { name: "Pioneer", res: "Level_B", mastery: [] };
let currentNode = null; // Stores the active lesson

// --- [ 1. INITIALIZATION ] ---
async function init() {
    try {
        puter.ui.setAppId(APP_ID);
        const puterUser = await puter.auth.getUser();
        user.name = puterUser ? puterUser.username : "Pioneer";

        const saved = await puter.kv.get('mastery_data');
        if (saved) user = JSON.parse(saved);

        print(`Welcome, <span class="highlight">${user.name}</span>. Node Online.`);
        print(`Current Resolution: <b>${user.res}</b>. Enter a topic to begin.`);
    } catch (err) {
        print("<span style='color:red'>Handshake Error. Check App ID.</span>");
    }
}

// --- [ 2. THE INTELLIGENCE ENGINE ] ---
async function processTopic(topic) {
    print(`<i>Supervisor: Synthesizing ${topic}...</i>`);
    const prompt = `Return ONLY JSON for topic "${topic}". 
    Levels: Level_A (analogy), Level_B (steps), Level_C (logic). 
    Assessment: {q: "question", a: "answer"}.`;

    try {
        const response = await puter.ai.chat(prompt);
        const cleanJSON = response.message.content.replace(/```json|```/g, "").trim();
        currentNode = JSON.parse(cleanJSON);
        
        // Display the lesson
        const content = currentNode[user.res] || currentNode.Level_B;
        print(`<br>--- [ ${topic.toUpperCase()} ] ---`);
        print(`<span class="highlight">${content}</span>`);
        print(`<br><b style="color:#00ff41">[GATEKEEPER]</b> ${currentNode.Assessment.q}`);
    } catch (err) {
        print("Error: Synthesis failed. Check Puter AI permissions.");
    }
}

// --- [ 3. THE GLOBAL COMMAND CENTER ] ---
document.getElementById('command').addEventListener('keydown', async (e) => {
    if (e.key === 'Enter') {
        const val = e.target.value.trim();
        if (!val) return;
        e.target.value = ''; // Clear input immediately

        // CASE A: If a quiz is active (currentNode exists)
        if (currentNode) {
            if (val.toLowerCase() === currentNode.Assessment.a.toLowerCase()) {
                print("✔ <b>Precision work.</b> Mastery locked.");
                user.mastery.push(currentNode.topic || "Unknown");
                await puter.kv.set('mastery_data', JSON.stringify(user));
                currentNode = null; // Clear node to return to topic mode
                print("Enter your next topic.");
            } else {
                print("✖ <b>Incomplete.</b> Scaling resolution to Level A for clarity.");
                user.res = "Level_A";
                await puter.kv.set('mastery_data', JSON.stringify(user));
                print(`<br><b style="color:#ff4141">[RE-TRY]</b> ${currentNode.Assessment.q}`);
            }
        } 
        // CASE B: If no quiz is active, treat input as a new Topic
        else {
            await processTopic(val);
        }
    }
});

// --- [ UTILS ] ---
function print(msg) {
    const log = document.getElementById('display');
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = msg;
    log.appendChild(div);
    window.scrollTo(0, document.body.scrollHeight);
}

init();
</script>
</body>
</html>
